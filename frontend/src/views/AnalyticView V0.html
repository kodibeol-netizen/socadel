<div class="dashboard-wrapper">
    <!-- En-tête -->
    <DashboardHeader :username="currentUsername" @logout="handleLogout" @profile="goToProfile" />

    <!-- Conteneur Principal avec largeur dynamique gauche/droite -->
    <main class="dashboard-content" :style="contentGridStyle">
      
      <!-- Colonne de Gauche Rétractable -->
      <section id="menu-gauche" :class="['scroll-container-left', { 'no-overflow-x': leftPanelState === 'normal' }]">
        
        <!-- Barre d'outils de dimensionnement du volet gauche -->
        <div class="panel-resize-bar">
          <span class="panel-title-indicator">🛠️ Contrôle de l'affichage</span>
          <div class="btn-group-resize">
            <button @click="setLeftPanelState('hidden')" :class="{ active: leftPanelState === 'hidden' }" title="Masquer le panneau">🔇 Masquer</button>
            <button @click="setLeftPanelState('half')" :class="{ active: leftPanelState === 'half' }" title="Réduire de moitié">🔲 Moitié</button>
            <button @click="setLeftPanelState('normal')" :class="{ active: leftPanelState === 'normal' }" title="Taille Normale">🔳 Normal</button>
          </div>
        </div>

        <!-- LIGNE 1 : Filtres + Synthèse Cycle -->
        <div class="row-dashboard-grid size-row-1">
          <div class="col-sidebar">
            <FilterSidebar 
              v-model:selectedCycle="selectedCycle"
              :cycles="cycles"
              :isLoading="isLoadingCycles"
              :listData="listData"
              :filters="filters"
              @search="handleSearch"
            />
          </div>
          <div class="col-fluid-table">
            <SyntheseTable 
              :selectedCycle="selectedCycle"
              :daysInCycle="daysInSelectedCycle"
              :treeData="syntheseTreeData"
              :selectedDay="selectedDay"
              :selectedCellsMap="selectedCellsMap"
              @select-day="selectDay"
              @cell-click="handleCellClick"
            />
          </div>
        </div>

        <!-- LIGNE 2 : Graphique large + Pointage Agents -->
        <div class="row-dashboard-grid size-row-2">
          <div class="col-sidebar-wide">
            <StatChart :actionsData="mockChartQuantities" />
          </div>
          <div class="col-fluid-table-narrow">
            <AgentPointageTable 
              :daysInCycle="daysInSelectedCycle"
              :agentsData="mockAgentsPointage"
              :selectedDay="selectedDay"
              :selectedCellsMap="selectedCellsMap"
              @select-day="selectDay"
              @cell-click="handleAgentCellClick"
            />
          </div>
        </div>

        <!-- LIGNE 3 : Pointage Clients -->
        <div class="row-dashboard-grid size-row-2">
          <div class="col-full-width">
            <ClientPointageTable 
              :daysInCycle="daysInSelectedCycle"
              :clientsData="mockClientsPointage"
              :selectedDay="selectedDay"
              :selectedCellsMap="selectedCellsMap"
              @select-day="selectDay"
              @cell-click="handleClientCellClick"
            />
          </div>
        </div>

        <!-- RECHERCHE GLOBALE + SÉLECTEUR DE COLONNES INLINE -->
        <div id="recherche" class="card search-action-bar">
          <div class="search-input-wrapper">
            <h3>⚡ Filtrer la recherche</h3>
            <input type="text" v-model="searchQuery" placeholder="Saisissez un texte pour filtrer..." class="form-control"/>
          </div>

          <div class="column-selector-dropdown">
            <button @click="isColMenuOpen = !isColMenuOpen" class="btn-dropdown-cols" type="button">
              <span>⚙️ Colonnes ({{ selectedExtraCols.length }})</span>
              <span class="arrow">▾</span>
            </button>
            <div v-if="isColMenuOpen" class="dropdown-cols-menu">
              <div v-for="col in extraColOptions" :key="col" class="dropdown-col-item">
                <input type="checkbox" :id="'col-'+col" :value="col" v-model="selectedExtraCols" />
                <label :for="'col-'+col">{{ col.toUpperCase() }}</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Indicateur de chargement réseau -->
        <div v-if="isLoadingQuery" class="network-loader-bar">
          <div class="spinner"></div>
          <span>Téléchargement de la base de données du cycle en cours (Patientez)...</span>
        </div>


        <!-- Modifiez cette ligne dans HomeView.vue -->
        <QueryResultTable 
          :results="filteredQueryResults" 
          :visibleColumns="selectedExtraCols" 
          :selectedRowId="activeQueryResultId"
          v-model:imageSource="selectedImageSource"
          @select-row="handleQueryResultSelect"
        />


      </section>

      <!-- Colonne de Droite : Cartographie Interactive active (Leaflet) -->
      <section id="map-container">
        <div id="map" ref="leafletMap"></div>
        <div v-if="leftPanelState === 'hidden'" class="floating-restore-trigger">
          <button @click="setLeftPanelState('normal')" class="btn-floating-restore" title="Restaurer le panneau gauche">➡️ Afficher les filtres</button>
        </div>
      </section>

    </main>
  </div>
